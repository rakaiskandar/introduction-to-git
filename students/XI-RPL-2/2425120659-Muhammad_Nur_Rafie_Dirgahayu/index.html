<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Profil Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blob"></div>
    <div class="background-blob2"></div>
    
    <div class="container">
        <div class="card">
            <div class="profile-header">
                <div class="image-container">
                    <img src="image.png" alt="Foto Profil">
                </div>
                <h1>Muhammad Nur Rafie Dirgahayu</h1>
                <p class="tagline">Software Engineering Student</p>
            </div>
            
            <div class="info-section">
                <div class="info-item">
                    <span class="label">Kelas</span>
                    <span class="value">XI RPL 2 (Rekayasa Perangkat Lunak)</span>
                </div>
                <div class="info-item">
                    <span class="label">Sekolah</span>
                    <span class="value">SMKN 4 Bandung</span>
                </div>
                <div class="info-item">
                    <span class="label">Hobi</span>
                    <div class="hobbies">
                        <span class="hobby-tag">Ngoding</span>
                        <span class="hobby-tag">Basket</span>
                        <span class="hobby-tag">Tidur</span>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                <p>Dibuat dengan semangat belajar &copy; 2026</p>
            </div>
        </div>
    </div>
</body>
</html>
