<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <title>Zaid Hifdzul Mumtaz | Profile</title>
</head>
<body>
    <main class="container">
        <article class="card">
            <header>
                <div class="profile-img-container">
                    <img src="FotoProfile.jpeg" alt="Zaid Hifdzul Mumtaz" class="profile-img">
                </div>
                <h1>Zaid Hifdzul Mumtaz</h1>
                <span class="class-badge">XI - Rekayasa Perangkat Lunak 1</span>
            </header>

            <section class="info-list">
                <div class="info-item">
                    <div class="info-icon"><i class="ph-bold ph-identification-card"></i></div>
                    <div class="info-content">
                        <span class="info-label">NIS</span>
                        <span class="info-value">2425120635</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="ph-bold ph-calendar"></i></div>
                    <div class="info-content">
                        <span class="info-label">Tanggal Lahir</span>
                        <span class="info-value">11 Juli 2009</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="ph-bold ph-map-pin"></i></div>
                    <div class="info-content">
                        <span class="info-label">Alamat</span>
                        <span class="info-value">Jl. Alamanda 1 No.43</span>
                    </div>
                </div>

                <div class="info-item">
                    <div class="info-icon"><i class="ph-bold ph-guitar"></i></div>
                    <div class="info-content">
                        <span class="info-label">Hobi</span>
                        <span class="info-value">Bermain Gitar</span>
                    </div>
                </div>
            </section>

            <footer>
                <p class="motto">Jangan Pernah Menyerah</p>
            </footer>
        </article>
    </main>
</body>
</html>
